<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <defs>
    <linearGradient id="clockGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00F2FE"/>
      <stop offset="50%" stop-color="#4FACFE"/>
      <stop offset="100%" stop-color="#7E14FF"/>
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="2.5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Outer ring of the clock -->
  <circle cx="50" cy="50" r="40" fill="none" stroke="url(#clockGrad)" stroke-width="8" filter="url(#glow)" />
  
  <!-- Center dot -->
  <circle cx="50" cy="50" r="5" fill="url(#clockGrad)" filter="url(#glow)" />
  
  <!-- Minute hand -->
  <line x1="50" y1="50" x2="50" y2="25" stroke="url(#clockGrad)" stroke-width="7" stroke-linecap="round" filter="url(#glow)" />
  
  <!-- Hour hand -->
  <line x1="50" y1="50" x2="68" y2="62" stroke="url(#clockGrad)" stroke-width="7" stroke-linecap="round" filter="url(#glow)" />
</svg>
